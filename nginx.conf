server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或服务器 IP

    root /var/www/lobster-blog;   # 替换为 dist 文件上传到服务器的目录
    index index.html;

    # ─── Gzip 压缩 ───────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ─── SPA 路由（最关键） ────────────────────────────────────
    # 所有路径都回退到 index.html，由 React Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── 静态资源强缓存（hash 文件名，永久缓存） ──────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── HTML 不缓存（保证更新后用户能拿到新版） ──────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ─── 安全响应头 ───────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ─── HTTPS 跳转（有 SSL 证书时取消注释） ──────────────────────
    # return 301 https://$host$request_uri;
}

