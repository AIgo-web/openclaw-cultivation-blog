name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: 部署到 GitHub Pages（域名备案期间保持正常）
  # ═══════════════════════════════════════════════════════════
  build-github:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages
        run: npx vite build --mode github

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-github:
    needs: build-github
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ═══════════════════════════════════════════════════════════
  # Job 2: 部署到腾讯云服务器（域名备案期间暂停）
  # ═══════════════════════════════════════════════════════════
  deploy-tencent:
    runs-on: ubuntu-latest
    # 域名备案期间禁用，备案完成后删除下面这行
    if: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build for Tencent Cloud
        run: npx vite build --mode tencent

      - name: Deploy to Tencent Cloud via SSH Key
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/var/www/lobster-blog"
          strip_components: 1
          overwrite: true

      - name: Reload Apache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: 22
          script: |
            sudo chown -R www-data:www-data /var/www/lobster-blog
            sudo chmod -R 755 /var/www/lobster-blog
            sudo systemctl reload apache2
            echo "Deploy done: $(date)"
